<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepSeek Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; overflow: hidden; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; }
    :root {
      --blue: #4D6BFE;
      --chat-bg: #EEF2FF;
      --header: #ffffff;
      --input-bg: #f0f2f8;
      --user-bubble: #4D6BFE;
      --ai-bubble: #ffffff;
    }
    body { background: var(--chat-bg); display: flex; flex-direction: column; height: 100vh; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .card { background: #fff; border-radius: 20px; padding: 28px 24px; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .card-title { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .card-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .card h3 { font-size: 15px; font-weight: 700; }
    .card p { font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.6; }
    .card input { width: 100%; border: 1.5px solid #ddd; border-radius: 10px; padding: 9px 12px; font-size: 13px; outline: none; font-family: monospace; }
    .card input:focus { border-color: var(--blue); }
    .error { font-size: 11px; color: #e53e3e; margin-top: 5px; display: none; }
    .card button { width: 100%; margin-top: 12px; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .header { background: var(--header); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e8eaf0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); flex-shrink: 0; }
    .h-avatar { width: 40px; height: 40px; border-radius: 13px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .h-name { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .h-status { font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
    .h-status.online { color: #22c55e; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .clear-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #aaa; padding: 6px; margin-left: auto; }
    .messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #c7d0f8; border-radius: 3px; }
    .date-div { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #94a3b8; padding: 4px 0 8px; }
    .date-div::before, .date-div::after { content:''; flex:1; height:1px; background:#dde3f0; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 11px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; align-self: flex-start; }
    .msg-group { display: flex; flex-direction: column; gap: 3px; max-width: 72%; }
    .msg-group.user { align-items: flex-end; }
    .sender { font-size: 11px; font-weight: 600; color: #64748b; padding-left: 2px; }
    .bubble-wrap { display: flex; align-items: flex-end; gap: 5px; }
    .user .bubble-wrap { flex-direction: row-reverse; }
    .bubble { padding: 9px 13px; border-radius: 18px; font-size: 14px; line-height: 1.65; word-break: break-word; white-space: pre-wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .bubble.ai { background: var(--ai-bubble); color: #1a1a1a; border-top-left-radius: 4px; }
    .bubble.user { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
    .meta { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; padding-bottom: 2px; }
    .read { font-size: 10px; color: #818cf8; font-weight: 600; }
    .ts { font-size: 10px; color: #94a3b8; }
    .typing { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble { background: var(--ai-bubble); border-radius: 18px; border-top-left-radius: 4px; padding: 11px 15px; display: flex; gap: 5px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .typing-bubble span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce 1.1s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-5px);opacity:1} }
    .input-area { background: var(--header); padding: 10px 12px 16px; border-top: 1px solid #e8eaf0; flex-shrink: 0; }
    .input-row { display: flex; align-items: flex-end; gap: 8px; background: var(--input-bg); border-radius: 22px; padding: 6px 8px 6px 14px; }
    textarea { flex: 1; background: none; border: none; outline: none; font-family: inherit; font-size: 14px; line-height: 1.5; resize: none; max-height: 120px; color: #1a1a1a; padding: 6px 0; }
    textarea::placeholder { color: #94a3b8; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--blue); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; flex-shrink: 0; box-shadow: 0 2px 8px rgba(77,107,254,0.35); transition: opacity 0.2s; }
    .send-btn:disabled { background: #c7d0f8; box-shadow: none; cursor: not-allowed; }
    .hint { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 7px; }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="card-title">
      <div class="card-icon">🐋</div>
      <h3>输入 DeepSeek API Key</h3>
    </div>
    <p>前往 platform.deepseek.com 获取 Key，支持支付宝/微信充值。Key 仅保存在内存中。</p>
    <input type="password" id="keyInput" placeholder="sk-..." autocomplete="off"/>
    <p class="error" id="keyError">格式不正确，Key 应以 sk- 开头</p>
    <button onclick="submitKey()">开始对话 ➤</button>
  </div>
</div>

<div class="header">
  <div class="h-avatar">🐋</div>
  <div>
    <div class="h-name">DeepSeek</div>
    <div class="h-status" id="status">等待连接…</div>
  </div>
  <button class="clear-btn" onclick="clearChat()">🗑</button>
</div>

<div class="messages" id="messages">
  <div class="date-div" id="dateDiv"></div>
  <div class="msg-row">
    <div class="msg-avatar">🐋</div>
    <div class="msg-group">
      <span class="sender">DeepSeek</span>
      <div class="bubble-wrap">
        <div class="bubble ai">你好！我是 DeepSeek，很高兴为你服务 😊</div>
        <div class="meta"><span class="read">1</span><span class="ts" id="welcomeTs"></span></div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="发送消息…" rows="1" disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled onclick="send()">➤</button>
  </div>
  <p class="hint">Enter 发送 · Shift+Enter 换行</p>
</div>

<script>
  let apiKey = '';
  let history = [];
  let loading = false;

  function nowStr() {
    return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false });
  }
  document.getElementById('dateDiv').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('welcomeTs').textContent = nowStr();

  document.getElementById('keyInput').addEventListener('keydown', e => { if(e.key==='Enter') submitKey(); });

  function submitKey() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val.startsWith('sk-')) { document.getElementById('keyError').style.display='block'; return; }
    apiKey = val;
    document.getElementById('overlay').style.display = 'none';
    const st = document.getElementById('status');
    st.textContent = '在线'; st.classList.add('online');
    st.innerHTML = '<span class="dot"></span> 在线';
    document.getElementById('input').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }

  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  input.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input', () => { input.style.height='auto'; input.style.height=input.scrollHeight+'px'; });

  function addMsg(text, role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const isAI = role === 'ai';
    if (isAI) {
      const av = document.createElement('div'); av.className='msg-avatar'; av.textContent='🐋';
      row.appendChild(av);
    }
    const group = document.createElement('div'); group.className=`msg-group ${role}`;
    if (isAI) { const s=document.createElement('span'); s.className='sender'; s.textContent='DeepSeek'; group.appendChild(s); }
    const bw = document.createElement('div'); bw.className='bubble-wrap';
    const bubble = document.createElement('div'); bubble.className=`bubble ${role}`; bubble.textContent=text;
    const meta = document.createElement('div'); meta.className='meta';
    meta.innerHTML=`<span class="read">1</span><span class="ts">${nowStr()}</span>`;
    if (isAI) { bw.appendChild(bubble); bw.appendChild(meta); }
    else { bw.appendChild(meta); bw.appendChild(bubble); }
    group.appendChild(bw); row.appendChild(group); messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div'); row.className='typing'; row.id='typing';
    const av = document.createElement('div'); av.className='msg-avatar'; av.textContent='🐋';
    const tb = document.createElement('div'); tb.className='typing-bubble';
    tb.innerHTML='<span></span><span></span><span></span>';
    row.appendChild(av); row.appendChild(tb); messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }
  function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

  async function send() {
    if (loading || !input.value.trim()) return;
    const text = input.value.trim(); input.value=''; input.style.height='auto';
    addMsg(text, 'user');
    const newHistory = [...history, { role:'user', content:text }];
    setHistory(newHistory); loading=true; setStatus('正在输入…');
    showTyping();
    try {
      const res = await fetch('https://api.deepseek.com/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
        body: JSON.stringify({ model:'deepseek-chat', max_tokens:1024, messages:[
          { role:'system', content:'你是一个友好的AI助手，请简洁自然地回复。' },
          ...newHistory
        ]})
      });
      if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（无回复）';
      removeTyping(); addMsg(reply, 'ai');
      history = [...newHistory, { role:'assistant', content:reply }];
    } catch(err) {
      removeTyping(); addMsg('⚠️ ' + (err.message||'发送失败，请重试'), 'ai');
    } finally { loading=false; setStatus('在线'); document.getElementById('sendBtn').disabled=false; input.focus(); }
  }

  function setStatus(t) {
    const st = document.getElementById('status');
    if (t==='在线') st.innerHTML='<span class="dot"></span> 在线';
    else st.textContent=t;
  }
  function setHistory(h) { history=h; }

  function clearChat() {
    history=[];
    [...messages.querySelectorAll('.msg-row,.typing')].forEach(e=>e.remove());
    addMsg('对话已清除！有什么可以帮你的吗？😊','ai');
  }
</script>
</body>
</html>
